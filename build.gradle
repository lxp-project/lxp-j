plugins {
    id 'java'
    id 'checkstyle'   // 1. 모든 플러그인은 여기서 한 번에 선언합니다.
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

// 2. Checkstyle 상세 설정
checkstyle {
    toolVersion = '10.12.17' // IntelliJ 설정에서 맞춘 버전과 동일하게!
    configFile = file('config/checkstyle/google_checks.xml')
    ignoreFailures = false   // 규칙 위반 시 빌드 실패 처리
    showViolations = true    // 콘솔에 위반 사항 표시
}

// 테스트 코드는 Checkstyle 검사 제외 (선택 사항)
checkstyleTest {
    enabled = false
}

dependencies {
    // 스프링 JDBC 유틸리티
    implementation 'org.springframework:spring-jdbc:6.1.5'

    // PostgreSQL JDBC 드라이버
    implementation 'org.postgresql:postgresql:42.7.2'

    // HikariCP (커넥션 풀)
    implementation 'com.zaxxer:HikariCP:5.1.0'

    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    // 로깅 구현체
    implementation 'ch.qos.logback:logback-classic:1.4.14'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}
